<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Azure Data Flow pipeline architecture</title>
  <desc id="desc">FastAPI sends ride events to Event Hubs; Azure Data Factory loads JSON files to ADLS; Databricks loads and processes data through Bronze, Silver, and Gold layers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef6f8"/>
      <stop offset="1" stop-color="#f7fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17202a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#116a7b"/>
    </marker>
    <style>
      .title { font: 800 32px 'Segoe UI', Arial, sans-serif; fill: #17202a; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #657282; }
      .label { font: 800 20px 'Segoe UI', Arial, sans-serif; fill: #17202a; }
      .small { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #657282; }
      .done { font: 800 12px 'Segoe UI', Arial, sans-serif; fill: #0f5132; }
      .box { fill: #ffffff; stroke: #d9e0e7; stroke-width: 1.5; rx: 14; filter: url(#shadow); }
      .box-done { stroke: #72c98d; }
      .box-plan { stroke: #f0c75e; }
      .pipe { fill: none; stroke: #116a7b; stroke-width: 3; marker-end: url(#arrow); }
      .pipe-soft { fill: none; stroke: #116a7b; stroke-width: 3; marker-end: url(#arrow); }
      .icon-bg { fill: #e8f4f6; stroke: #b8dce3; stroke-width: 1; }
      .badge-done { fill: #dff5e9; }
    </style>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="48" y="58" class="title">Azure Data Flow Architecture</text>
  <text x="48" y="86" class="subtitle">Finished target architecture for real-time and batch ride data on Azure and Databricks.</text>

  <g transform="translate(52 132)">
    <rect class="box box-done" width="210" height="118"/>
    <circle class="icon-bg" cx="38" cy="38" r="20"/>
    <text x="25" y="45" class="label" font-size="17">API</text>
    <text x="72" y="42" class="label">FastAPI GUI</text>
    <text x="72" y="68" class="small">Ride events</text>
    <rect x="72" y="82" width="58" height="22" rx="11" class="badge-done"/>
    <text x="86" y="97" class="done">DONE</text>
  </g>

  <path class="pipe" d="M268 191 C305 191 315 191 352 191"/>

  <g transform="translate(356 132)">
    <rect class="box box-done" width="210" height="118"/>
    <circle class="icon-bg" cx="38" cy="38" r="20"/>
    <text x="24" y="45" class="label" font-size="17">EH</text>
    <text x="72" y="42" class="label">Event Hubs</text>
    <text x="72" y="68" class="small">Kafka stream</text>
    <rect x="72" y="82" width="58" height="22" rx="11" class="badge-done"/>
    <text x="86" y="97" class="done">DONE</text>
  </g>

  <path class="pipe" d="M572 191 C609 191 619 191 656 191"/>

  <g transform="translate(660 132)">
    <rect class="box box-done" width="210" height="118"/>
    <circle class="icon-bg" cx="38" cy="38" r="20"/>
    <text x="24" y="45" class="label" font-size="17">DB</text>
    <text x="72" y="42" class="label">Databricks</text>
    <text x="72" y="68" class="small">Delta loads</text>
    <rect x="72" y="82" width="58" height="22" rx="11" class="badge-done"/>
    <text x="86" y="97" class="done">DONE</text>
  </g>

  <path class="pipe-soft" d="M876 191 C913 191 923 191 960 191"/>

  <g transform="translate(964 132)">
    <rect class="box box-plan" width="184" height="118"/>
    <circle class="icon-bg" cx="38" cy="38" r="20"/>
    <text x="25" y="45" class="label" font-size="17">BI</text>
    <text x="72" y="42" class="label">Analytics</text>
    <text x="72" y="68" class="small">BI reporting</text>
    <rect x="72" y="82" width="58" height="22" rx="11" class="badge-done"/>
    <text x="86" y="97" class="done">DONE</text>
  </g>

  <g transform="translate(52 292)">
    <rect class="box box-done" width="248" height="118"/>
    <circle class="icon-bg" cx="38" cy="38" r="20"/>
    <text x="25" y="45" class="label" font-size="17">JS</text>
    <text x="72" y="42" class="label">JSON files</text>
    <text x="72" y="68" class="small">Lookup maps</text>
    <rect x="72" y="82" width="58" height="22" rx="11" class="badge-done"/>
    <text x="86" y="97" class="done">DONE</text>
  </g>

  <path class="pipe" d="M306 351 C343 351 353 351 390 351"/>

  <g transform="translate(394 292)">
    <rect class="box box-done" width="248" height="118"/>
    <circle class="icon-bg" cx="38" cy="38" r="20"/>
    <text x="27" y="45" class="label" font-size="17">DF</text>
    <text x="72" y="42" class="label">Data Factory</text>
    <text x="72" y="68" class="small">Lookup, ForEach, Copy</text>
    <rect x="72" y="82" width="58" height="22" rx="11" class="badge-done"/>
    <text x="86" y="97" class="done">DONE</text>
  </g>

  <path class="pipe" d="M648 351 C685 351 695 351 732 351"/>

  <g transform="translate(736 292)">
    <rect class="box box-done" width="248" height="118"/>
    <circle class="icon-bg" cx="38" cy="38" r="20"/>
    <text x="27" y="45" class="label" font-size="17">DL</text>
    <text x="72" y="42" class="label">ADLS Gen2</text>
    <text x="72" y="68" class="small">Raw storage</text>
    <rect x="72" y="82" width="58" height="22" rx="11" class="badge-done"/>
    <text x="86" y="97" class="done">DONE</text>
  </g>

  <path class="pipe" d="M860 292 C860 274 765 274 765 254"/>
</svg>
